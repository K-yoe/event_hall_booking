name: event_hall_booking
description: Event Hall & Conference Room Booking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local Storage
  shared_preferences: ^2.2.3

  # UI
  cached_network_image: ^3.3.1

  # Database (local SQLite)
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/databases/event_hall.db
